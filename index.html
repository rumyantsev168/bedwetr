<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BedWetr - a Minecraft server">
    <link rel="stylesheet" href="assets/css/stylesheet.css">
    <link rel="icon" href="assets/icon.webp">
    <title>BedWetr! By Tommy</title>
</head>
<body>
    <header>
        <img id="icon" src="assets/icon.webp">
        <b style="font-size: 18px" class="animated">Made by Tommy and his bro DaDuck</b>
        <div id="socials">
            <a href="https://app.revolt.chat/invite/q5Ke82BV" target="_blank">
                <img src="assets/revoltchat.svg" height="60px" title="Revolt Chat">
            </a>
        </div>
    </header>
    <main>
        <img id="logo" src="assets/logo.webp">
        <p>Welcome to the ultimate Minecraft server experience!</p>
        <code id="ip" onclick="select(this)">wss://bedw3tr.bytommy.uk</code>
        <div id="gamemodes">
            <div>Survival</div>
            <div>PvP</div>
            <div>Speed-bridging</div>
            <div>Natural Disasters</div>
            <div>Pillars of Fortune</div>
        </div>
        <ws-server-plate address="wss://bedw3tr.bytommy.uk" displayname="BedWetr"></ws-server-plate>
        <p>&downarrow; Mace and Wind Charge crafting recipes &downarrow;</p>
        <div id="recipes">
            <item-slot-grid>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Gold.png" tooltip="Block of Gold"></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Coal.png" tooltip="Block of Coal"></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Gold.png" tooltip="Block of Gold"></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Gold.png" tooltip="Block of Gold"></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Coal.png" tooltip="Block of Coal"></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Block_of_Gold.png" tooltip="Block of Gold"></item-slot>
                <item-slot></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Blaze_Rod.png" tooltip="Blaze Rod"></item-slot>
                <item-slot></item-slot>
                <item-slot result large item="https://minecraft.wiki/images/Invicon_Stone_Hoe.png" tooltip="&cMace"></item-slot>
            </item-slot-grid>
            <item-slot-grid continue>
                <item-slot></item-slot>
                <item-slot></item-slot>
                <item-slot></item-slot>
                <item-slot></item-slot>
                <item-slot item="https://minecraft.wiki/images/Invicon_Coal.png" tooltip="Coal"></item-slot>
                <item-slot result large item="https://minecraft.wiki/images/Invicon_Snowball.png" tooltip="&cWind Charge" count="4"></item-slot>
            </item-slot-grid>
        </div>
        <small>Vote for the server <a href="https://servers.eaglercraft.com/servers/b2bd3c2e-fedb-48c2-88ce-e643a9167444" target="_blank">here</a>!</small>
    </main>
    <script src="assets/js/selection.js"></script>
    <script src="assets/js/textAnimation.js"></script>
    <script src="https://rumyantsev168.github.io/static/js/ItemSlot.js"></script>
    <script src="https://rumyantsev168.github.io/static/js/WSServerPlate.js"></script>
</body>
</html>
